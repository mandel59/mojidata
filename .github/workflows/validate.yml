name: Validate

on:
  pull_request:
  push:
    branches:
      - develop

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NO_UPDATE_NOTIFIER: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Restore mojidata build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/mojidata/dist
            packages/mojidata/cache
            packages/mojidata/resources
          key: mojidata-${{ runner.os }}-${{ hashFiles('packages/mojidata/download.txt', 'packages/mojidata/package.json', 'packages/mojidata/scripts/**', 'packages/mojidata/build-data/unihan-tr38-properties.json') }}
          restore-keys: |
            mojidata-${{ runner.os }}-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Check changesets on pull requests
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
        run: corepack yarn changeset status --since=origin/${{ github.base_ref }}

      - name: Build workspace for pull requests
        if: github.event_name == 'pull_request'
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: corepack yarn ci:build:affected

      - name: Build affected workspace for branch pushes
        if: github.event_name != 'pull_request' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          CI_BASE_SHA: ${{ github.event.before }}
          CI_HEAD_SHA: ${{ github.sha }}
        run: corepack yarn ci:build:affected

      - name: Build full workspace for branch creation pushes
        if: github.event_name != 'pull_request' && github.event.before == '0000000000000000000000000000000000000000'
        run: corepack yarn ci:build

      - name: Check publish artifacts for pull requests
        if: github.event_name == 'pull_request'
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: corepack yarn ci:pack:affected

      - name: Check affected publish artifacts for branch pushes
        if: github.event_name != 'pull_request' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          CI_BASE_SHA: ${{ github.event.before }}
          CI_HEAD_SHA: ${{ github.sha }}
        run: corepack yarn ci:pack:affected

      - name: Check full publish artifacts for branch creation pushes
        if: github.event_name != 'pull_request' && github.event.before == '0000000000000000000000000000000000000000'
        run: corepack yarn ci:pack

      - name: Run affected tests for pull requests
        if: github.event_name == 'pull_request'
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: corepack yarn ci:test:affected

      - name: Run affected tests for branch pushes
        if: github.event_name != 'pull_request' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          CI_BASE_SHA: ${{ github.event.before }}
          CI_HEAD_SHA: ${{ github.sha }}
        run: corepack yarn ci:test:affected

      - name: Run full test suite for branch creation pushes
        if: github.event_name != 'pull_request' && github.event.before == '0000000000000000000000000000000000000000'
        run: corepack yarn ci:test
