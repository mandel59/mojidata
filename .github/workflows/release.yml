name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      packages: write
    env:
      NO_UPDATE_NOTIFIER: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Restore mojidata build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/mojidata/dist
            packages/mojidata/cache
            packages/mojidata/resources
          key: mojidata-${{ runner.os }}-${{ hashFiles('packages/mojidata/download.txt', 'packages/mojidata/package.json', 'packages/mojidata/scripts/**', 'packages/mojidata/build-data/unihan-tr38-properties.json') }}
          restore-keys: |
            mojidata-${{ runner.os }}-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Run test suite before release actions
        run: corepack yarn ci:test

      - name: Check publish artifacts before release actions
        run: corepack yarn ci:pack

      - name: Create release pull request or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: corepack yarn version-packages
          publish: corepack yarn release
          commit: Version Packages
          title: Version Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summarize release result
        env:
          CHANGESETS_PUBLISHED: ${{ steps.changesets.outputs.published }}
          CHANGESETS_PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          {
            echo "## Release Result"
            if [ "$CHANGESETS_PUBLISHED" = "true" ]; then
              echo
              echo "Published packages:"
              echo
              node -e '
                const packages = JSON.parse(process.env.CHANGESETS_PUBLISHED_PACKAGES || "[]");
                if (packages.length === 0) {
                  console.log("- Publish completed, but Changesets did not report package metadata.");
                } else {
                  for (const pkg of packages) {
                    console.log(`- \`${pkg.name}@${pkg.version}\``);
                  }
                }
              '
            else
              echo
              echo "No npm publish happened in this run."
              echo
              echo "This usually means the workflow created or updated the release pull request instead."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
