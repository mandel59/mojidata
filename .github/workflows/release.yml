name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      packages: write
    env:
      NO_UPDATE_NOTIFIER: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Restore mojidata build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/mojidata/dist
            packages/mojidata/cache
            packages/mojidata/resources
          key: mojidata-${{ runner.os }}-${{ hashFiles('packages/mojidata/download.txt', 'packages/mojidata/package.json', 'packages/mojidata/scripts/**', 'packages/mojidata/build-data/unihan-tr38-properties.json') }}
          restore-keys: |
            mojidata-${{ runner.os }}-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Run test suite before release actions
        run: corepack yarn ci:test

      - name: Check publish artifacts before release actions
        run: corepack yarn ci:pack

      - name: Create or update release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: corepack yarn version-packages
          commit: Version Packages
          title: Version Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages with trusted publishing
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: corepack yarn release

      - name: Summarize release result
        env:
          CHANGESETS_HAS_CHANGESETS: ${{ steps.changesets.outputs.hasChangesets }}
        run: |
          {
            echo "## Release Result"
            if [ "$CHANGESETS_HAS_CHANGESETS" = "false" ]; then
              echo
              echo "Trusted publishing path executed."
              echo
              echo "Check the publish step logs and npm registry results for the exact package versions."
            else
              echo
              echo "Release pull request created or updated."
              echo
              echo "No npm publish happened in this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
